<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Water molecule logo mark</title>
  <desc id="desc">A clean dark logo-style emblem with two stylized water molecules.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0F1C"/>
      <stop offset="1" stop-color="#15233D"/>
    </linearGradient>
    <linearGradient id="ring" x1="96" y1="96" x2="416" y2="416" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7FB5FF"/>
      <stop offset="1" stop-color="#57D1FF"/>
    </linearGradient>
    <radialGradient id="oxygen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(30)">
      <stop stop-color="#FF9A9A"/>
      <stop offset="1" stop-color="#E04C4C"/>
    </radialGradient>
    <radialGradient id="hydrogen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(16)">
      <stop stop-color="#E2F1FF"/>
      <stop offset="1" stop-color="#95C3F0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="164" stroke="url(#ring)" stroke-opacity="0.75" stroke-width="6"/>
  <circle cx="256" cy="256" r="140" stroke="#8FCBFF" stroke-opacity="0.2" stroke-width="2"/>

  <g transform="translate(212 240)" filter="url(#softGlow)">
    <line x1="0" y1="0" x2="-48" y2="-32" stroke="#A4D0FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="50" y2="-30" stroke="#A4D0FF" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="30" fill="url(#oxygen)"/>
    <circle cx="-48" cy="-32" r="16" fill="url(#hydrogen)"/>
    <circle cx="50" cy="-30" r="16" fill="url(#hydrogen)"/>
  </g>

  <g transform="translate(308 288)" filter="url(#softGlow)">
    <line x1="0" y1="0" x2="-44" y2="-36" stroke="#A4D0FF" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="52" y2="-24" stroke="#A4D0FF" stroke-width="6" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="30" fill="url(#oxygen)"/>
    <circle cx="-44" cy="-36" r="16" fill="url(#hydrogen)"/>
    <circle cx="52" cy="-24" r="16" fill="url(#hydrogen)"/>
  </g>
</svg>
